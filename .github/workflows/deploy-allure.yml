name: Deploy Allure Report to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Deploy Allure Report
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout --orphan gh-pages
          git rm -rf .
          if [ -d "qa-automation-framework/allure-report" ]; then
            cp -r qa-automation-framework/allure-report/* .
          else
            echo "Warning: allure-report directory not found at qa-automation-framework/allure-report"
            mkdir -p .
            echo "# Allure Report" > index.html
          fi
          git add .
          git commit -m "Deploy Allure report from main"
          git push -f origin gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
